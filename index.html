<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REL</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d; /* Deep charcoal */
            --text: #f0f0f0;
            --impact: rgba(217, 74, 56, 0.8); /* Impact glow color */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Lock scrolling during the intro sequence */
        }

        /* --- STAGE 1: OPENING REVEAL (3s) --- */
        #stage-1-reveal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Phase this stage out after 3 seconds */
            animation: stageOut 1s ease 3s forwards;
        }

        #stage-1-reveal h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(5rem, 15vw, 15rem);
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text);
            /* Staggered text reveal */
            animation: revealUp 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }

        @keyframes revealUp {
            0% { transform: translateY(100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* --- STAGE 2: PROJECT SLAM (1s) --- */
        #stage-2-slam {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; /* Flat black for slam impact contrast */
            z-index: 900;
            opacity: 0; /* Starts hidden */
            display: flex;
            justify-content: center;
            align-items: center;
            /* Activate when Stage 1 finishes */
            animation: stageIn 0.1s ease 3s forwards, stageOut 1s ease 4s forwards;
        }

        /* The Hand Element (Uses an abstract graphic placeholder) */
        #slam-hand {
            width: 150px;
            height: 150px;
            background: url('path_to_your_hand_icon.png') no-repeat center center/contain;
            background-color: #333; /* Placeholder visual */
            border-radius: 50%;
            /* Slam down animation */
            animation: slamDown 1s cubic-bezier(0.77, 0, 0.175, 1) 3s forwards;
            position: absolute;
            top: -200px;
        }

        #slam-impact {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%) scale(0);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--impact) 0%, transparent 70%);
            border-radius: 50%;
            /* Impact effect */
            animation: impactReveal 1s ease 3.3s forwards;
        }

        @keyframes slamDown {
            0% { top: -200px; opacity: 1; }
            100% { top: 70%; opacity: 0; }
        }

        @keyframes impactReveal {
            0% { transform: translateX(-50%) scale(0); opacity: 0; }
            50% { transform: translateX(-50%) scale(5); opacity: 1; }
            100% { transform: translateX(-50%) scale(6); opacity: 0; }
        }

        /* --- STAGE 3: ALIGNMENT (2s) --- */
        #stage-3-aligned {
            position: relative;
            padding: 10rem 4rem;
            z-index: 800;
            opacity: 0; /* Starts hidden */
            /* Fade this stage in when Stage 2 finishes */
            animation: stageIn 1.5s ease 4.5s forwards;
        }

        .main-title {
            font-family: 'Syne', sans-serif;
            font-size: 4rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        /* A simple line divider */
        .line {
            height: 2px;
            background: var(--text);
            margin: 2rem 0 5rem 0;
            width: 0;
            animation: expandWidth 1.5s cubic-bezier(0.77, 0, 0.175, 1) 5.5s forwards;
        }

        /* --- THE ALIGNED PROJECTS --- */
        .project-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }

        .project-tile {
            background-color: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.4s ease;
            /* Sequential project tile entry */
            animation: revealUp 1s ease 6s forwards;
        }

        /* Hover effect: tiles glow and lift */
        .project-tile:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(217, 74, 56, 0.2);
        }

        .project-tile h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .project-tile p {
            color: #999;
            font-weight: 300;
        }

        /* Staggered project animation delays */
        .project-tile:nth-child(2) { animation-delay: 6.2s; }
        .project-tile:nth-child(3) { animation-delay: 6.4s; }
        .project-tile:nth-child(4) { animation-delay: 6.6s; }

        /* --- UTILITY ANIMATIONS --- */
        @keyframes stageIn { 100% { opacity: 1; } }
        @keyframes stageOut { 100% { transform: translateY(-100%); opacity: 0; visibility: hidden; } }
        @keyframes expandWidth { 100% { width: 100%; } }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            #stage-3-aligned { padding: 5rem 2rem; }
            .project-row { grid-template-columns: 1fr; gap: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="stage-1-reveal">
        <div style="overflow: hidden;">
            <h1>REL.</h1>
        </div>
    </div>

    <div id="stage-2-slam">
        <div id="slam-hand"></div>
        <div id="slam-impact"></div>
    </div>

    <main id="stage-3-aligned">
        <h2 class="main-title">P R O J E C T S: A L I G N E D</h2>
        <div class="line"></div>
        
        <div class="project-row">
            <div class="project-tile">
                <h3>01: Architecture</h3>
                <p>System Design</p>
            </div>
            <div class="project-tile">
                <h3>02: Systems</h3>
                <p>Infrastructure</p>
            </div>
            <div class="project-tile">
                <h3>03: Data</h3>
                <p>Visualization</p>
            </div>
            <div class="project-tile">
                <h3>04: Brand</h3>
                <p>Identity</p>
            </div>
        </div>
    </main>

</body>
</html>
