<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REL</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; /* Pitch black for seamless blending */
            --text: #ffffff;
            --accent: #ff4500; /* Fire/Explosion Orange */
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            height: 100vh;
        }

        /* --- 1. THE SCREEN SHAKE EFFECTS --- */
        #sequence-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
            /* Triggers exactly when the hand hits the bottom (4.0s) */
            animation: shake 0.6s cubic-bezier(.36,.07,.19,.97) 4.0s forwards;
        }

        @keyframes shake {
            0%, 100% { transform: translate3d(0, 0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate3d(-20px, 15px, 0); }
            20%, 40%, 60%, 80% { transform: translate3d(20px, -15px, 0); }
        }

        /* --- 2. THE DESCENDING HAND --- */
        #the-hand-container {
            position: absolute;
            top: 0; 
            left: 50%;
            margin-left: -200px; /* Centers the 400px wide container */
            width: 400px;
            height: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* The choreography: Entry, Slow Creep, Windup, Slam! */
            animation: 
                handMovement 4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards,
                hideHand 0.1s linear 4.0s forwards;
        }

        #the-hand-image {
            width: 100%;
            height: 450px;
            /* LIVE REALISTIC HAND IMAGE */
            background-image: url('http://googleusercontent.com/image_collection/image_retrieval/6916022743801547202_0');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
            /* This strips the black background away perfectly */
            mix-blend-mode: screen; 
            filter: grayscale(40%) contrast(1.2); /* Makes it look gritty and cinematic */
            position: relative;
            z-index: 10;
        }

        /* The glowing core (your projects) held in the grip */
        #held-cargo {
            position: absolute;
            bottom: 150px; 
            width: 60px;
            height: 60px;
            background: rgba(255, 69, 0, 0.9);
            box-shadow: 0 0 50px 20px rgba(255, 69, 0, 0.8), 0 0 100px 40px rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            z-index: 5;
            animation: pulseGlow 0.5s infinite alternate;
        }

        /* The Exact Timing of the Slam */
        @keyframes handMovement {
            0% { transform: translateY(-100vh); }
            10% { transform: translateY(-20vh); } /* Fast entry */
            85% { transform: translateY(5vh); }  /* Very slow, menacing creep downwards */
            92% { transform: translateY(-5vh); } /* Winds up/pulls back slightly */
            100% { transform: translateY(70vh); } /* MASSIVE SLAM INTO THE GROUND */
        }

        @keyframes hideHand {
            to { opacity: 0; visibility: hidden; display: none; }
        }

        @keyframes pulseGlow {
            to { box-shadow: 0 0 80px 40px rgba(255, 69, 0, 1), 0 0 120px 50px rgba(255, 255, 255, 0.6); }
        }

        /* --- 3. THE EXPLOSION --- */
        #explosion-gfx {
            position: absolute;
            top: 50%; left: 50%;
            margin-top: -400px; margin-left: -400px;
            width: 800px; height: 800px;
            /* LIVE EXPLOSION IMAGE */
            background-image: url('http://googleusercontent.com/image_collection/image_retrieval/9872055587267074690_0');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            mix-blend-mode: screen;
            opacity: 0;
            transform: scale(0.1);
            /* Triggers exactly on impact */
            animation: boom 1.5s ease-out 4.0s forwards;
            z-index: 100;
        }

        #flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: white;
            z-index: 1001;
            opacity: 0;
            pointer-events: none;
            animation: whiteFlash 0.8s ease-out 4.0s forwards;
        }

        @keyframes boom {
            0% { opacity: 0; transform: scale(0.1); }
            10% { opacity: 1; transform: scale(1.5); }
            100% { opacity: 0; transform: scale(3); filter: blur(15px) brightness(0); }
        }

        @keyframes whiteFlash {
            0% { opacity: 0; }
            10% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* --- 4. THE AFTERMATH (YOUR GAMES REVEAL) --- */
        #main-content {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 8rem 4rem;
            box-sizing: border-box;
            opacity: 0;
            z-index: 50;
            /* Fades in through the smoke after the explosion */
            animation: revealContent 2s ease 4.8s forwards;
            overflow-y: auto; 
        }

        @keyframes revealContent {
            0% { opacity: 0; transform: translateY(100px); }
            100% { opacity: 1; transform: translateY(0); pointer-events: all; }
        }

        .title-wrapper {
            text-align: center;
            margin-bottom: 5rem;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 6rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 69, 0, 0.5);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* The Game Cards */
        .card {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid rgba(255, 69, 0, 0.4);
            border-radius: 8px;
            padding: 50px 30px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            cursor: pointer;
        }

        /* Glowing hover effect */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(255,69,0,0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 69, 0, 1);
            box-shadow: 0 15px 50px rgba(255, 69, 0, 0.3);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card h2 {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            margin-bottom: 15px;
            position: relative;
            z-index: 2;
        }

        .card p {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 2;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            #main-content { padding: 5rem 2rem; }
            h1 { font-size: 4rem; }
            #the-hand-container { transform: scale(0.7); }
        }
    </style>
</head>
<body>

    <div id="sequence-wrapper">
        <div id="the-hand-container">
            <div id="the-hand-image"></div>
            <div id="held-cargo"></div>
        </div>
        
        <div id="explosion-gfx"></div>
    </div>
    
    <div id="flash"></div>

    <div id="main-content">
        <div class="title-wrapper">
            <h1>R E L</h1>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>GAME 01</h2>
                <p>Awaiting Link</p>
            </div>
            <div class="card">
                <h2>GAME 02</h2>
                <p>Awaiting Link</p>
            </div>
            <div class="card">
                <h2>GAME 03</h2>
                <p>Awaiting Link</p>
            </div>
            <div class="card">
                <h2>GAME 04</h2>
                <p>Awaiting Link</p>
            </div>
        </div>
    </div>

</body>
</html>
