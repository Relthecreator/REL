<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REL | The Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #f0f0f0;
            --accent: #d94a38; /* Rich terracotta/rust */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            cursor: crosshair; /* Premium editorial detail */
        }

        /* --- INSANE ANIMATIONS --- */
        @keyframes revealUp {
            0% { transform: translateY(100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes expandWidth {
            0% { width: 0; }
            100% { width: 100%; }
        }

        /* --- THE LOADER SCREEN --- */
        .loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent);
            z-index: 9999;
            /* Slides up and out of the way after 1.5 seconds */
            animation: slideOut 1.2s cubic-bezier(0.77, 0, 0.175, 1) 0.8s forwards;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .loader h1 {
            font-family: 'Syne', sans-serif;
            font-size: 5rem;
            color: var(--bg);
            letter-spacing: -2px;
        }

        @keyframes slideOut {
            100% { transform: translateY(-100%); }
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            mix-blend-mode: difference; /* Keeps nav visible on any background */
            z-index: 100;
        }
        
        nav div {
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 4rem;
            position: relative;
        }

        .hero-title-wrapper {
            overflow: hidden;
            line-height: 0.9;
        }

        .hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(5rem, 12vw, 15rem);
            font-weight: 800;
            text-transform: uppercase;
            /* Hollow text effect */
            color: transparent;
            -webkit-text-stroke: 2px var(--text);
            transform: translateY(100%);
            /* Staggered reveal after the loader finishes */
            animation: revealUp 1s cubic-bezier(0.77, 0, 0.175, 1) 1.5s forwards;
        }
        
        .hero h1 span {
            color: var(--text);
            -webkit-text-stroke: 0;
            transition: color 0.4s ease;
        }

        .hero h1:hover span {
            color: var(--accent);
        }

        .line {
            height: 2px;
            background: var(--text);
            margin: 2rem 0;
            width: 0;
            animation: expandWidth 1.5s cubic-bezier(0.77, 0, 0.175, 1) 2s forwards;
        }

        .hero p {
            max-width: 450px;
            font-size: 1.2rem;
            font-weight: 300;
            line-height: 1.6;
            opacity: 0;
            animation: revealUp 1s ease 2.2s forwards;
        }

        /* --- ASYMMETRICAL PROJECT GRID --- */
        .projects {
            padding: 10rem 4rem;
        }
        
        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 4rem;
            margin-bottom: 5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2rem;
        }

        .project {
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* Breaking the grid for a high-end look */
        .project:nth-child(1) { grid-column: 1 / 8; height: 70vh; }
        .project:nth-child(2) { grid-column: 9 / 13; height: 60vh; margin-top: 15rem; }
        .project:nth-child(3) { grid-column: 3 / 11; height: 80vh; margin-top: 8rem; }

        .project-img {
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            /* Pulling high-res abstract placeholders from Unsplash */
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1), filter 0.8s ease;
            filter: grayscale(100%) brightness(0.7);
        }
        
        .project:nth-child(2) .project-img {
            background-image: url('https://images.unsplash.com/photo-1604871000636-074fa5117945?q=80&w=2574&auto=format&fit=crop');
        }
        
        .project:nth-child(3) .project-img {
            background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2670&auto=format&fit=crop');
        }

        /* The Juice: Image scales up and gains color on hover */
        .project:hover .project-img {
            transform: scale(1.05);
            filter: grayscale(0%) brightness(1);
        }

        .project-info {
            position: absolute;
            bottom: 0;
            left: 0;
            padding: 3rem;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            transform: translateY(30px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .project:hover .project-info {
            transform: translateY(0);
            opacity: 1;
        }

        .project-info h3 {
            font-family: 'Syne', sans-serif;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .project-info p {
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        /* Mobile Fixes */
        @media (max-width: 768px) {
            .hero { padding: 0 2rem; }
            nav { padding: 1.5rem 2rem; }
            .grid { display: flex; flex-direction: column; }
            .project:nth-child(1), .project:nth-child(2), .project:nth-child(3) { height: 50vh; margin-top: 0; }
            .projects { padding: 5rem 2rem; }
        }
    </style>
</head>
<body>

    <div class="loader">
        <h1>REL.</h1>
    </div>

    <nav>
        <div>REL</div>
        <div>Folio &copy;2026</div>
    </nav>

    <section class="hero">
        <div class="hero-title-wrapper">
            <h1>VISION<span>ARY</span></h1>
        </div>
        <div class="hero-title-wrapper">
            <h1>CREATOR.</h1>
        </div>
        <div class="line"></div>
        <p>I don't do templates. I build digital experiences that demand attention. Scroll down to see the work.</p>
    </section>

    <section class="projects">
        <h2 class="section-title">Selected Work</h2>
        <div class="grid">
            
            <div class="project">
                <div class="project-img"></div>
                <div class="project-info">
                    <h3>Project Alpha</h3>
                    <p>Art Direction</p>
                </div>
            </div>

            <div class="project">
                <div class="project-img"></div>
                <div class="project-info">
                    <h3>The Sequence</h3>
                    <p>Digital Design</p>
                </div>
            </div>

            <div class="project">
                <div class="project-img"></div>
                <div class="project-info">
                    <h3>Echo Chamber</h3>
                    <p>Branding</p>
                </div>
            </div>

        </div>
    </section>

</body>
</html>
