<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REL</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; /* Darker charcoal */
            --text: #f0f0f0;
            --impact-glow: rgba(217, 74, 56, 1); /* Terra Cotta glow */
            --project-icon-glow: rgba(255, 255, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Lock scrolling during intro */
        }

        /* --- STAGE 1: OPENING REVEAL (3s) --- */
        #stage-1-reveal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: stageOut 1s ease 3s forwards;
        }

        #stage-1-reveal h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(5rem, 15vw, 15rem);
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text);
            animation: revealUp 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards;
            mix-blend-mode: difference; /* Brace yourself */
        }

        @keyframes revealUp {
            0% { transform: translateY(100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* --- STAGE 2: THE VICIOUS SLAM (1.5s) --- */
        #stage-2-slam {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; /* Contrast black */
            z-index: 900;
            opacity: 0; /* Starts hidden */
            display: flex;
            justify-content: center;
            align-items: center;
            animation: stageIn 0.1s ease 3s forwards, stageOut 1s ease 4.5s forwards;
        }

        /* The dynamic Hand Grip Assembly (descends at 3s) */
        #hand-grip {
            position: absolute;
            top: -200px; /* Starts above frame */
            width: 150px;
            height: 200px;
            /* Stylized robotic/metallic hand graphic */
            background: linear-gradient(135deg, #1a1a1a 0%, #333 50%, #1a1a1a 100%);
            clip-path: polygon(10% 0, 90% 0, 90% 10%, 100% 20%, 90% 80%, 90% 90%, 10% 90%, 0 80%, 10% 20%);
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: slamDown 1s cubic-bezier(0.77, 0, 0.175, 1) 3s forwards, recede 1s ease 4.3s forwards;
        }

        /* Small project icons 'held' inside the hand structure */
        .held-project-icon {
            width: 30px;
            height: 30px;
            background-color: var(--text);
            border-radius: 4px;
            margin: 5px;
            opacity: 0.8;
            box-shadow: 0 0 10px var(--project-icon-glow);
        }

        /* The Impact Visual (triggers when hand reaches 70%) */
        #slam-impact {
            position: absolute;
            bottom: 30%; /* Match slamDown 70% point */
            left: 50%;
            transform: translateX(-50%) scale(0);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--impact-glow) 0%, transparent 70%);
            border-radius: 50%;
            animation: impactReveal 1s ease 3.3s forwards, impactDebris 0.5s ease 3.3s forwards;
            opacity: 0;
        }

        /* UTILITY DEBRIS SHAPE */
        #debris {
            position: absolute;
            bottom: 30%; left: 50%;
            transform: translateX(-50%) scale(0);
            width: 150px;
            height: 150px;
            border: 2px dashed rgba(217, 74, 56, 0.3);
            border-radius: 50%;
            animation: impactDebris 0.8s ease 3.3s forwards;
            opacity: 0;
        }

        @keyframes slamDown {
            0% { top: -200px; opacity: 1; }
            100% { top: 70%; opacity: 1; }
        }

        @keyframes recede {
            0% { top: 70%; opacity: 1; }
            100% { top: 50%; opacity: 0; }
        }

        @keyframes impactReveal {
            0% { transform: translateX(-50%) scale(0); opacity: 0; }
            50% { transform: translateX(-50%) scale(5); opacity: 1; }
            100% { transform: translateX(-50%) scale(6); opacity: 0; }
        }

        @keyframes impactDebris {
            0% { transform: translateX(-50%) scale(0); opacity: 0; }
            50% { transform: translateX(-50%) scale(3); opacity: 1; }
            100% { transform: translateX(-50%) scale(4); opacity: 0; }
        }

        /* --- STAGE 3: ALIGNMENT (Starts at 4.5s) --- */
        #stage-3-aligned {
            position: relative;
            padding: 10rem 4rem;
            z-index: 800;
            opacity: 0; /* Starts hidden */
            animation: stageIn 1.5s ease 4.5s forwards;
        }

        .main-title {
            font-family: 'Syne', sans-serif;
            font-size: 4rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        /* Brutalist line divider */
        .line {
            height: 2px;
            background: var(--text);
            margin: 2rem 0 5rem 0;
            width: 0;
            animation: expandWidth 1.5s cubic-bezier(0.77, 0, 0.175, 1) 5.5s forwards;
        }

        /* --- THE ALIGNED PROJECT TILES --- */
        .project-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }

        .project-tile {
            background-color: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            animation: revealUp 1s ease 6s forwards;
        }

        /* Tile hover effects: Lift and subtle text color */
        .project-tile:hover {
            transform: translateY(-8px);
            border-color: var(--impact-glow);
            box-shadow: 0 10px 30px rgba(217, 74, 56, 0.2);
        }

        .project-tile h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .project-tile p {
            color: #999;
            font-weight: 300;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* Subtle indicator that games go here */
        .project-tile::after {
            content: 'G A M E S';
            position: absolute;
            bottom: -20px;
            right: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 0.7rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.03);
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .project-tile:hover::after {
            color: rgba(255, 255, 255, 0.1);
        }

        /* Sequential tile delay */
        .project-tile:nth-child(2) { animation-delay: 6.2s; }
        .project-tile:nth-child(3) { animation-delay: 6.4s; }
        .project-tile:nth-child(4) { animation-delay: 6.6s; }

        /* --- UTILITY ANIMATIONS --- */
        @keyframes stageIn { 100% { opacity: 1; } }
        @keyframes stageOut { 100% { transform: translateY(-100%); opacity: 0; visibility: hidden; } }
        @keyframes expandWidth { 100% { width: 100%; } }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            #stage-3-aligned { padding: 5rem 2rem; }
            .project-row { grid-template-columns: 1fr; gap: 1.5rem; }
            .project-tile h3 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="stage-1-reveal">
        <div style="overflow: hidden;">
            <h1>REL.</h1>
        </div>
    </div>

    <div id="stage-2-slam">
        <div id="hand-grip">
            <div class="held-project-icon"></div>
            <div class="held-project-icon" style="opacity: 1;"></div>
            <div class="held-project-icon"></div>
        </div>
        <div id="slam-impact"></div>
        <div id="debris"></div>
    </div>

    <main id="stage-3-aligned">
        <h2 class="main-title">P R O J E C T S: A L I G N E D</h2>
        <div class="line"></div>
        
        <div class="project-row">
            <div class="project-tile">
                <h3>Aetheria</h3>
                <p>Systems RPG</p>
            </div>
            <div class="project-tile">
                <h3>Void Runner</h3>
                <p>Action Platformer</p>
            </div>
            <div class="project-tile">
                <h3>Cipher</h3>
                <p>Data Puzzle</p>
            </div>
            <div class="project-tile">
                <h3>Echo</h3>
                <p>Narrative Sim</p>
            </div>
        </div>
    </main>

</body>
</html>
